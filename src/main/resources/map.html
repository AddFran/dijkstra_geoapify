<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Mapa Perú</title>

    <link href="ol.css" rel="stylesheet" />
    <script src="ol.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    let apiKey = "";

    function setApiKey(key) {
        apiKey = key;
    }
</script>

<script>

    const map = new ol.Map({
        target: "map",
        layers: [
            new ol.layer.Tile({
                source: new ol.source.XYZ({
                    url: `https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?&apiKey=${apiKey}`
                })
            })
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([-75.0152, -9.1900]), // Perú
            zoom: 5
        })
    });
</script>
<script>
    const markersLayer = new ol.layer.Vector({
        source: new ol.source.Vector()
    });

    map.addLayer(markersLayer);

    function agregarNodo(lat, lon, nombre) {
        const marker = new ol.Feature({
            geometry: new ol.geom.Point(
                ol.proj.fromLonLat([lon, lat])
            ),
            name: nombre
        });

        markersLayer.getSource().addFeature(marker);
    }
</script>
<script>
    const routeLayer = new ol.layer.Vector({
        source: new ol.source.Vector()
    });

    map.addLayer(routeLayer);

    function dibujarRuta(coords) {

        // Limpiar ruta anterior
        routeLayer.getSource().clear();

        const transformedCoords = coords.map(c =>
            ol.proj.fromLonLat([c[1], c[0]])
        );

        const linea = new ol.Feature({
            geometry: new ol.geom.LineString(transformedCoords)
        });

        routeLayer.getSource().addFeature(linea);
    }
</script>

</body>
</html>
